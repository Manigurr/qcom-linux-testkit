metadata:
  format: Lava-Test Test Definition 1.0
  name: Video_V4L2_LocalClips_Compliance
  description: "Run Video V4L2 runner (Upstream Only) with explicit V4L2 Compliance testing."
  maintainer:
    - smuppand@qti.qualcomm.com
  os:
    - openembedded
  scope:
    - functional

run:
  steps:
    - cd Runner
    - export REPO_ROOT="$PWD"
    - export TARGET="${TARGET:-}" # kodiak | lemans | monaco (case-insensitive)

    - |
      # --- Configuration ---
      RPATH="$REPO_ROOT/suites/Multimedia/Video/Video_V4L2_Runner/run_v4l2_iris.sh"
      RESFILE="$REPO_ROOT/suites/Multimedia/Video/Video_V4L2_Runner/Video_V4L2_Runner.res"
      
      # Local resources
      CLIPS_TAR="/data/vendor/iris_test_app/video_clips_iris.tar.gz"
      V4L2_BIN="/usr/bin/v4l2-compliance"

      # --- Platform Detection ---
      # Prefer explicit TARGET; otherwise derive from LAVA device-type
      if [ -n "${TARGET:-}" ]; then
        TL="$(printf '%s' "$TARGET" | tr '[:upper:]' '[:lower:]')"
      else
        DEVTYPE_RAW="${DEVICE_TYPE:-${LAVA_DEVICE_TYPE:-${LAVA_DEVICE_TYPE_NAME:-${DEVICE_TYPE_NAME:-}}}}"
        DEVTYPE="$(printf '%s' "$DEVTYPE_RAW" | tr '[:upper:]' '[:lower:]')"
        case "$DEVTYPE" in
          qcs8300-ride|qcs8300-ride-sx|iq-8275-evk) TL="monaco" ;;
          qcs9100-ride-r3|sa8775p-ride|iq-9075-evk|qcs9075-rb8|qcs9100-ride-sx) TL="lemans" ;;
          qcs6490-rb3gen2|rb3gen2|qcs6490-rb3gen2-core-kit) TL="kodiak" ;;
          *) TL="" ;;
        esac
      fi

      case "$TL" in
        kodiak|lemans|monaco) PLAT="--platform $TL" ;;
        *) PLAT="" ;; 
      esac

      echo "DEBUG: TARGET='${TARGET:-}' Detected Platform='$TL' Args='$PLAT'"

      # --- Arguments ---
      ARGS_COMMON="--clips-tar $CLIPS_TAR --app /data/vendor/iris_test_app/iris_v4l2_test $PLAT --retry-on-fail 2 --loglevel 15"

      # Force BASE stack only
      ARGS_BASE="--stack base $ARGS_COMMON"
      
      # ---------------------------------------------------------
      # STEP 1: Run Upstream (Base) Functional Tests
      # ---------------------------------------------------------
      echo ">>> [LAVA] Starting Upstream (Base) Functional Tests"
      sh -lc "$RPATH $ARGS_BASE" || true
      "$REPO_ROOT/utils/send-to-lava.sh" "$RESFILE" || true

      # ---------------------------------------------------------
      # STEP 2: Run V4L2 Compliance (Upstream Context)
      # ---------------------------------------------------------
      echo ">>> [LAVA] Starting V4L2 Compliance on Upstream"
      
      if [ -x "$V4L2_BIN" ]; then
          # Loop through video nodes (e.g., /dev/video0, /dev/video1)
          found_nodes=0
          for dev in /dev/video*; do
              if [ -e "$dev" ]; then
                  found_nodes=1
                  echo "---------------------------------------------------"
                  echo ">>> Running compliance on $dev"
                  echo "---------------------------------------------------"
                  # Run compliance; allow fail (|| true) to prevent aborting the script entirely
                  $V4L2_BIN -d "$dev" || echo "Compliance failed on $dev"
              fi
          done
          
          if [ "$found_nodes" -eq 0 ]; then
              echo "WARNING: No /dev/video* nodes found for compliance testing."
          fi
      else
          echo "ERROR: v4l2-compliance binary not found at $V4L2_BIN"
      fi

      # ---------------------------------------------------------
      # FINISH: Parse Results
      # ---------------------------------------------------------
      # (Step 3 Overlay removed per request)
      "$REPO_ROOT/utils/result_parse.sh" || true